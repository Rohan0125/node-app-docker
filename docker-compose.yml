services:

  node-app:
    build: ./app
    container_name: node-app
    networks:
      - devops-net

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node-app
    networks:
      - devops-net

networks:
  devops-net:
